<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hecy - Hece Bulmaca Oyunu</title>
    <style>
        /* --- NORMAL OYUN STİLLERİ (KILIF) --- */
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --background: #F7FFF7;
            --text-dark: #2F3640;
            --slot-bg: #E1F5FE;
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--background);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 1.5s, color 1.5s;
        }

        h1 {
            color: var(--primary);
            font-size: 4rem;
            margin-top: 20px;
            text-shadow: 3px 3px 0px var(--accent);
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .character-select {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            align-items: center;
            justify-content: center;
        }

        .char-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px 40px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #1A936F;
            transition: transform 0.1s, box-shadow 0.1s, filter 1s, opacity 1s;
            position: relative;
        }

        .normal-btn {
            z-index: 10; 
        }

        .char-btn:hover { transform: translateY(2px); box-shadow: 0 6px 0 #1A936F; }
        .char-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #1A936F; }

        /* --- OYUN EKRANI --- */
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 800px; padding: 20px; z-index: 10; }
        #welcome-text { font-size: 2rem; color: var(--secondary); margin-bottom: 20px; }
        #abin-guide { display: flex; align-items: center; background-color: white; border: 4px solid var(--accent); border-radius: 30px; padding: 15px 25px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; animation: float 3s ease-in-out infinite; }
        .abin-avatar { font-size: 4rem; margin-right: 20px; }
        .bubble { background-color: #F1F2F6; padding: 15px; border-radius: 20px; position: relative; font-size: 1.4rem; color: #2F3640; }
        .bubble::before { content: ''; position: absolute; left: -15px; top: 50%; transform: translateY(-50%); border-width: 10px 15px 10px 0; border-style: solid; border-color: transparent #F1F2F6 transparent transparent; }
        .game-area { background: white; border-radius: 30px; padding: 30px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #drop-zone { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; min-height: 100px; }
        .drop-slot { width: 100px; height: 100px; border: 4px dashed #CED6E0; border-radius: 20px; background-color: var(--slot-bg); display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .drop-slot.drag-over { border-color: var(--secondary); background-color: #E8F8F5; transform: scale(1.05); }
        #drag-zone { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; min-height: 100px; padding: 20px; background-color: #f1f2f6; border-radius: 20px; }
        .syllable { width: 90px; height: 90px; background-color: var(--primary); color: white; font-size: 2.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 15px; cursor: grab; box-shadow: 0 6px 0 #D63031; transition: transform 0.1s; }
        .syllable:active { cursor: grabbing; }
        .syllable.dragging { opacity: 0.5; transform: scale(1.1); }
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti { position: absolute; width: 15px; height: 15px; top: -20px; border-radius: 4px; animation: fall linear forwards; }

        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); } 100% { transform: translateY(100vh) rotate(720deg); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* --- KORKU MODU EKLENTİLERİ --- */

        body.horror-mode {
            background-color: #070000;
            animation: screenVibrate 0.1s infinite;
            overflow: hidden; /* DİKKAT: Scrollbar çıkmasını kesin engeller */
        }

        body.horror-mode h2 { color: #5a0000; font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 5px #ff0000; transition: all 1s;}

        /* Normal butonlar cansızlaşır ve kararır */
        body.horror-mode .normal-btn {
            pointer-events: none;
            filter: grayscale(100%) brightness(20%) blur(1px);
            box-shadow: 0 8px 0 #020202;
            transform: scale(0.95);
        }

        /* Damarlar için Canvas */
        #vein-canvas {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh; /* Tam ekranı kaplar ama taşırmaz */
            pointer-events: none;
            z-index: 5; /* Normal tuşların (10) arkasında kalır */
            display: none;
            opacity: 0.85; 
        }

        /* Rahm Tuşu */
        #secret-btn {
            display: none; 
            background-color: #050000;
            color: #cc0000;
            border: 1px solid #440000;
            border-radius: 5px;
            padding: 15px 35px;
            font-family: "Courier New", Courier, monospace;
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px #330000, inset 0 0 10px #330000;
            text-shadow: 1px 1px 2px #ff0000;
            z-index: 20; 
            cursor: pointer;
            animation: glitchReveal 0.4s cubic-bezier(.36,.07,.19,.97) forwards;
            position: relative;
        }

        #secret-btn:hover { background-color: #1a0000; box-shadow: 0 0 25px #aa0000, inset 0 0 15px #aa0000; color: #ff0000; }

        /* İsmin Glitch ile değişmesi */
        .title-died {
            color: #8b0000 !important;
            text-shadow: 2px 2px 0px #220000, -2px -2px 0px #000 !important;
            font-family: 'Courier New', Courier, monospace !important;
            animation: deadGlitch 0.3s 3 forwards;
        }

        @keyframes glitchReveal {
            0% { transform: scale(0.5) skew(20deg); opacity: 0; filter: invert(1); }
            50% { transform: scale(1.2) skew(-10deg); opacity: 0.8; filter: invert(0); }
            70% { transform: scale(0.9) skew(5deg); opacity: 1; }
            100% { transform: scale(1) skew(0deg); opacity: 1; }
        }

        @keyframes screenVibrate {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-0.5px, 0.5px); }
            50% { transform: translate(0.5px, -0.5px); }
            75% { transform: translate(-0.5px, -0.5px); }
            100% { transform: translate(0.5px, 0.5px); }
        }

        @keyframes deadGlitch {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-3px, 2px); opacity: 0.7; }
            40% { transform: translate(3px, -2px); opacity: 1; color: #ff0000; }
            60% { transform: translate(-2px, -3px); opacity: 0.5; color: #000; }
            80% { transform: translate(2px, 3px); opacity: 1; }
            100% { transform: translate(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="vein-canvas"></canvas>

    <div id="start-screen">
        <h1 id="main-title">HECY</h1>
        <h2 id="sub-title">Adını Seç ve Oyuna Başla!</h2>
        
        <div class="character-select" id="char-select">
            <button class="char-btn normal-btn" id="btn-eylul" onclick="startGame('Eylül')">👧 Eylül</button>
            <button class="char-btn normal-btn" id="btn-agustos" onclick="startGame('Ağustos')" style="background-color: var(--primary); box-shadow: 0 8px 0 #D63031;">👦 Ağustos</button>
            
            <button id="secret-btn" onclick="goSecret()">RAHM</button>
        </div>
    </div>

    <!-- Orijinal Oyun -->
    <div id="game-screen">
        <h2 id="welcome-text"></h2>
        <div id="abin-guide">
            <div class="abin-avatar">🧑‍🏫</div>
            <div class="bubble">
                <strong style="color: var(--primary);">Abin diyor ki:</strong><br>
                <span id="abin-hint">Buraya ipucu gelecek!</span>
            </div>
        </div>
        <div class="game-area">
            <div id="drop-zone"></div>
            <div id="drag-zone"></div>
        </div>
    </div>

    <div id="confetti-container"></div>

    <script>
        let typedKeys = "";
        const secretCode = "02006";
        let isCorrupted = false;

        window.addEventListener('keydown', (e) => {
            if (isCorrupted || document.getElementById('start-screen').style.display === 'none') return;

            typedKeys += e.key;
            if (typedKeys.length > secretCode.length) typedKeys = typedKeys.slice(-secretCode.length);

            if (typedKeys === secretCode) {
                triggerCorruption();
            }
        });

        function triggerCorruption() {
            isCorrupted = true;
            
            // Ekranın kaydırma özelliğini tamamen kapat
            document.body.style.overflow = 'hidden';
            document.body.classList.add('horror-mode');
            
            setTimeout(() => {
                document.getElementById('sub-title').innerText = "k a y b o l d u n";
            }, 500);
            
            const secretBtn = document.getElementById('secret-btn');
            secretBtn.style.display = 'block';

            setTimeout(() => {
                const rect = secretBtn.getBoundingClientRect();
                const startX = rect.left + (rect.width / 2);
                const startY = rect.top + (rect.height / 2);
                
                document.getElementById('vein-canvas').style.display = 'block';
                startSlowCreepingVeins(startX, startY);
            }, 100);
        }

        function goSecret() {
            window.location.href = 'gizem.html';
        }

        // --- RASTGELE YAYILAN VE SİNSİ DAMAR SİSTEMİ ---
        let titleChanged = false;

        function startSlowCreepingVeins(originX, originY) {
            const canvas = document.getElementById('vein-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const btnEylul = document.getElementById('btn-eylul').getBoundingClientRect();
            const btnAgustos = document.getElementById('btn-agustos').getBoundingClientRect();
            const titleEl = document.getElementById('main-title').getBoundingClientRect();
            
            let branches = [];
            const darkColors = ['#4a0000', '#2a0000', '#110000', '#0a0a0a', '#600000'];

            // 1. Hedefe (butonlara ve başlığa) sinsice yaklaşacak damarlar (Miktar azaltıldı)
            const targetData = [
                { x: btnEylul.left + btnEylul.width / 2, y: btnEylul.top + btnEylul.height / 2, count: 6, type: 'spread' },
                { x: btnAgustos.left + btnAgustos.width / 2, y: btnAgustos.top + btnAgustos.height / 2, count: 6, type: 'spread' },
                { x: titleEl.left + titleEl.width / 2, y: titleEl.bottom - 10, count: 4, type: 'title' }
            ];

            targetData.forEach(target => {
                for(let i=0; i<target.count; i++) {
                    branches.push({
                        x: originX, y: originY, tx: target.x, ty: target.y,
                        angle: Math.atan2(target.y - originY, target.x - originX) + (Math.random() - 0.5),
                        width: Math.random() * 2 + 1.5,
                        speed: Math.random() * 1.5 + 0.5,
                        color: darkColors[Math.floor(Math.random() * darkColors.length)],
                        targetType: target.type,
                        wanderLimit: Math.random() * 0.3 // Sapma oranı
                    });
                }
            });

            // 2. Rastgele yönlere, bambaşka uzaklıklara yayılacak serbest (Wild) damarlar
            for(let i=0; i<45; i++) { // Sayı artırıldı, daha çok yayılsın
                branches.push({
                    x: originX, y: originY,
                    angle: Math.random() * Math.PI * 2, // 360 derece rastgele fırlama
                    width: Math.random() * 2.5 + 1.5, // Başlangıç kalınlığı
                    speed: Math.random() * 1.8 + 0.5,
                    color: darkColors[Math.floor(Math.random() * darkColors.length)],
                    targetType: 'wild', // Hedefi yok, sadece yayılacak
                    wanderLimit: Math.random() * 0.6 // Serbest damarlar daha çok kıvrılsın
                });
            }

            ctx.shadowBlur = 4;
            ctx.shadowColor = '#000000';

            function draw() {
                if (branches.length === 0) return;
                let newBranches = [];
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                branches.forEach(b => {
                    if (b.width < 0.15) return; // İyice incelene kadar ilerle

                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y);

                    if (b.targetType === 'wild') {
                        // Serbest yayılma: Rastgele kıvrılır, kendi yolunu çizer
                        b.angle += (Math.random() - 0.5) * b.wanderLimit;
                        
                        // Arada bir sert dönüşler (kırık damar efekti)
                        if(Math.random() < 0.02) {
                            b.angle += (Math.random() - 0.5) * 1.5;
                        }
                    } else {
                        // Hedefe giden damarlar
                        let angleToTarget = Math.atan2(b.ty - b.y, b.tx - b.x);
                        let distToTarget = Math.hypot(b.tx - b.x, b.ty - b.y);

                        if (distToTarget > 60) {
                            // Uzaksa hedefe yönel
                            b.angle += (angleToTarget - b.angle) * 0.04 + (Math.random() - 0.5) * b.wanderLimit; 
                        } else {
                            // Yaklaşınca yönelimi bırak, etrafında serbest süzül
                            b.angle += (Math.random() - 0.5) * 0.8;
                            b.speed *= 0.98; // Yaklaşınca yavaşla
                            
                            // Başlık değişimi
                            if (b.targetType === 'title' && distToTarget < 30 && !titleChanged) {
                                const title = document.getElementById('main-title');
                                title.innerText = "Hecydied";
                                title.classList.add('title-died');
                                titleChanged = true;
                                b.width = 0;
                            }
                        }
                    }
                    
                    b.x += Math.cos(b.angle) * b.speed;
                    b.y += Math.sin(b.angle) * b.speed;
                    
                    // İnceltmeyi çok yavaşlat ki ekranın farklı uzaklıklarına kadar uzanabilsinler
                    b.width *= 0.998; 

                    ctx.strokeStyle = b.color;
                    ctx.lineWidth = b.width;
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();

                    // İlerlerken yeni kılcal damarlar çıkarma (Ağ örme efekti)
                    if (Math.random() < 0.018 && b.width > 1) { // Çatallanma ihtimali hafif artırıldı
                        newBranches.push({
                            x: b.x, y: b.y, tx: b.tx, ty: b.ty,
                            angle: b.angle + (Math.random() > 0.5 ? 0.8 : -0.8), // 45 derecelik sapmalar
                            width: b.width * 0.7, 
                            speed: b.speed * 0.85, 
                            color: b.color,
                            targetType: b.targetType,
                            wanderLimit: b.wanderLimit
                        });
                    }
                    
                    if (b.width >= 0.15) newBranches.push(b);
                });
                branches = newBranches;
                requestAnimationFrame(draw);
            }
            draw();
        }

        /* =========================================
           NORMAL OYUN SİSTEMİ (KILIF)
           ========================================= */
        const levels = [
            { word: "KEDİ", syllables: ["KE", "Dİ"], hint: "Miyavlayan, yumuşacık tüyleri olan sevimli dostumuz kim?" },
            { word: "ELMA", syllables: ["EL", "MA"], hint: "Kıpkırmızı, kıtır kıtır... Ağaçta yetişen çok lezzetli bir meyve!" },
            { word: "AĞAÇ", syllables: ["A", "ĞAÇ"], hint: "Kuşların yuva yaptığı, yeşil yaprakları olan doğa dostu!" },
            { word: "KİTAP", syllables: ["Kİ", "TAP"], hint: "İçinde bolca masal ve resim olan harika şeyin adı nedir?" },
            { word: "ARABA", syllables: ["A", "RA", "BA"], hint: "Düt düüüt! Yollarda hızlıca giden, dört tekerlekli araç!" }
        ];

        let currentLevel = 0; let playerName = "";
        const startScreen = document.getElementById('start-screen'); const gameScreen = document.getElementById('game-screen');
        const welcomeText = document.getElementById('welcome-text'); const abinHint = document.getElementById('abin-hint');
        const dropZone = document.getElementById('drop-zone'); const dragZone = document.getElementById('drag-zone');
        const confettiContainer = document.getElementById('confetti-container');

        function startGame(name) {
            if(isCorrupted) return; 
            playerName = name; startScreen.style.display = 'none'; gameScreen.style.display = 'flex';
            welcomeText.innerText = `Hecy'ye Hoş Geldin, ${playerName}!`; loadLevel();
        }

        function loadLevel() {
            dropZone.innerHTML = ''; dragZone.innerHTML = '';
            const levelData = levels[currentLevel]; abinHint.innerText = levelData.hint;

            levelData.syllables.forEach((_, index) => {
                const slot = document.createElement('div'); slot.classList.add('drop-slot'); slot.setAttribute('data-index', index);
                slot.addEventListener('dragover', handleDragOver); slot.addEventListener('dragenter', handleDragEnter);
                slot.addEventListener('dragleave', handleDragLeave); slot.addEventListener('drop', handleDropSlot);
                dropZone.appendChild(slot);
            });

            let shuffledSyllables = [...levelData.syllables].sort(() => Math.random() - 0.5);
            shuffledSyllables.forEach((syllableText, index) => {
                const syllableBox = document.createElement('div'); syllableBox.classList.add('syllable'); syllableBox.innerText = syllableText;
                syllableBox.setAttribute('draggable', 'true'); syllableBox.id = `syllable-${index}`;
                
                const colors = ['#FF6B6B', '#4ECDC4', '#FF9F43', '#9b59b6'];
                syllableBox.style.backgroundColor = colors[index % colors.length];
                syllableBox.style.boxShadow = `0 6px 0 ${shadeColor(colors[index % colors.length], -20)}`;

                syllableBox.addEventListener('dragstart', handleDragStart); syllableBox.addEventListener('dragend', handleDragEnd);
                dragZone.appendChild(syllableBox);
            });
            dragZone.addEventListener('dragover', handleDragOver); dragZone.addEventListener('drop', handleDropPool);
        }

        function handleDragStart(e) { e.dataTransfer.setData('text/plain', e.target.id); setTimeout(() => { e.target.classList.add('dragging'); }, 0); }
        function handleDragEnd(e) { e.target.classList.remove('dragging'); }
        function handleDragOver(e) { e.preventDefault(); }
        function handleDragEnter(e) { e.preventDefault(); if (e.target.classList.contains('drop-slot')) e.target.classList.add('drag-over'); }
        function handleDragLeave(e) { if (e.target.classList.contains('drop-slot')) e.target.classList.remove('drag-over'); }
        function handleDropSlot(e) {
            e.preventDefault(); const targetSlot = e.target.closest('.drop-slot');
            if (targetSlot) {
                targetSlot.classList.remove('drag-over'); const id = e.dataTransfer.getData('text/plain'); const draggableElement = document.getElementById(id);
                if (draggableElement) { targetSlot.appendChild(draggableElement); draggableElement.style.margin = '0'; checkWinCondition(); }
            }
        }
        function handleDropPool(e) {
            e.preventDefault();
            if(e.target.id === 'drag-zone') {
                const id = e.dataTransfer.getData('text/plain'); const draggableElement = document.getElementById(id);
                if (draggableElement) { dragZone.appendChild(draggableElement); checkWinCondition(); }
            }
        }

        function checkWinCondition() {
            const levelData = levels[currentLevel]; const slots = dropZone.querySelectorAll('.drop-slot');
            let formedWord = ""; let isFull = true;
            slots.forEach(slot => { if (slot.children.length > 0) formedWord += slot.children[0].innerText; else isFull = false; });

            if (isFull && formedWord === levelData.word) {
                abinHint.innerText = `Harikasın ${playerName}! "${levelData.word}" kelimesini buldun!`; triggerConfetti();
                slots.forEach(slot => { slot.children[0].style.animation = 'pop 0.5s ease'; });
                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel < levels.length) loadLevel();
                    else {
                        abinHint.innerText = `Mükemmelsin! Tüm oyunları bitirdin. 🎉`; dropZone.innerHTML = '';
                        dragZone.innerHTML = '<button class="char-btn normal-btn" onclick="location.reload()">Tekrar Oyna</button>';
                    }
                }, 3500);
            }
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16); let G = parseInt(color.substring(3,5),16); let B = parseInt(color.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100); G = parseInt(G * (100 + percent) / 100); B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255; R = Math.round(R); G = Math.round(G); B = Math.round(B);
            return "#" + ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16)) + ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16)) + ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
        }

        function triggerConfetti() {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#1A936F', '#9b59b6'];
            for (let i = 0; i < 70; i++) {
                const confetti = document.createElement('div'); confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.width = (Math.random() * 10 + 5) + 'px'; confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's'; confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                confettiContainer.appendChild(confetti); setTimeout(() => { confetti.remove(); }, 4000);
            }
        }
    </script>
</body>
</html>
