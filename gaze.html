<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKIŞ - ZİFİRİ KARANLIK</title>
    <style>
        body {
            margin: 0; overflow: hidden;
            background-color: #1a1a1a; /* Aydınlandığında görünecek zemin rengi (Beton/Kirli) */
            background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
            background-size: 20px 20px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; cursor: crosshair;
        }

        #game-container { width: 100vw; height: 100vh; position: relative; }

        /* Duvarlar - Işık vurduğunda görünecekler */
        .wall {
            position: absolute;
            background-color: #222;
            border: 2px solid #555;
            box-shadow: inset 0 0 15px #000;
            z-index: 5;
            transition: transform 0.2s, opacity 0.2s; /* Yıkım animasyonu için */
        }

        .wall.destroyed {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        #target-zone {
            position: absolute; top: 10%; left: 80%;
            width: 60px; height: 60px; border: 2px dashed #0f0;
            color: #0f0; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 0 20px rgba(0,255,0,0.5);
            z-index: 10; opacity: 0; transition: opacity 1s; font-weight: bold;
        }

        /* Göz Elemanı (Işık katmanının altında ama karanlıkta parlayacak) */
        #the-eye-container {
            position: absolute; width: 120px; height: 120px;
            transform: translate(-50%, -50%); 
            z-index: 15;
        }

        #the-eye {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #d9c8c8 10%, #6a1a1a 70%, #1a0000 95%);
            border-radius: 50%; position: relative; overflow: hidden;
            box-shadow: 0 0 20px #000, inset 0 0 30px #000;
        }

        #iris {
            width: 55px; height: 55px;
            background: radial-gradient(circle, #ffcc00 5%, #880000 60%, #110000 90%);
            border-radius: 50%; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        #pupil {
            width: 8px; height: 45px; background: #000; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: all 0.2s;
            box-shadow: inset 0 0 5px red;
        }

        /* Göz bebeğinin kovalama anındaki parlaması */
        .enraged #pupil {
            background: #ff0000;
            width: 35px; height: 35px;
            box-shadow: 0 0 40px #ff0000, inset 0 0 20px #fff;
        }

        .enraged #the-eye {
            border: 3px solid #800;
            box-shadow: 0 0 50px #f00;
        }

        .eyelid {
            position: absolute; width: 140px; height: 70px;
            background-color: #030000; left: -10px; z-index: 16;
            transition: transform 0.05s ease-in-out;
        }
        #eyelid-top { top: -10px; transform-origin: top; transform: scaleY(0); border-radius: 0 0 50% 50%; border-bottom: 2px solid #200;}
        #eyelid-bottom { bottom: -10px; transform-origin: bottom; transform: scaleY(0); border-radius: 50% 50% 0 0; border-top: 2px solid #200;}

        .blink #eyelid-top { transform: scaleY(1); }
        .blink #eyelid-bottom { transform: scaleY(1); }

        /* Canvas Maskesi (Gerçek Karanlık için en üstte) */
        #lighting-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            z-index: 50; /* UI hariç her şeyin üstünde */
            pointer-events: none; /* Tıklamaları engellememesi için */
        }

        /* UI Elemanları (Karanlığın da üstünde) */
        #start-menu {
            position: absolute; bottom: 40px; left: 40px;
            text-align: center; z-index: 100; transition: opacity 0.5s ease;
        }
        #start-menu h1 { font-size: 4rem; color: #800; margin: 0 0 15px 0; letter-spacing: 15px; text-shadow: 0 0 10px #f00; }
        #start-btn { padding: 15px 40px; background: #111; color: #fff; border: 1px solid #800; cursor: pointer; font-weight: bold;}
        #start-btn:hover { background: #500; }

        #message-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 6rem; font-weight: bold; color: #f00; z-index: 200; opacity: 0; pointer-events: none;
            text-shadow: 0 0 30px #f00;
        }

        /* Sert Ekran Sarsıntısı */
        .shake-hard { animation: shakeHard 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeHard {
            0%, 100% { transform: translate3d(0, 0, 0); }
            20% { transform: translate3d(20px, -20px, 0); }
            40% { transform: translate3d(-20px, 20px, 0); }
            60% { transform: translate3d(20px, 20px, 0); }
            80% { transform: translate3d(-20px, -20px, 0); }
        }

    </style>
</head>
<body>

<div id="game-container">
    
    <!-- Çevresel Duvarlar (DOM) -->
    <div class="wall" id="w0"></div>
    <div class="wall" id="w1"></div>
    <div class="wall" id="w2"></div>
    <div class="wall" id="w3"></div>
    <div class="wall" id="w4"></div>
    <div class="wall" id="w5"></div>

    <div id="target-zone">ÇIKIŞ</div>

    <div id="the-eye-container">
        <div id="the-eye">
            <div id="iris"><div id="pupil"></div></div>
        </div>
        <div id="eyelid-top" class="eyelid"></div>
        <div id="eyelid-bottom" class="eyelid"></div>
    </div>

    <!-- Karanlık ve Işık Maskesi -->
    <canvas id="lighting-canvas"></canvas>

    <div id="start-menu">
        <h1>BAKIŞ</h1>
        <button id="start-btn">BAŞLAT</button>
    </div>

    <div id="message-screen">ÖLDÜN.</div>
</div>

<script>
    const canvas = document.getElementById('lighting-canvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    const eyeContainer = document.getElementById('the-eye-container');
    const iris = document.getElementById('iris');
    const pupil = document.getElementById('pupil');
    const targetZone = document.getElementById('target-zone');
    const messageScreen = document.getElementById('message-screen');

    let gameState = 'menu'; 
    let mouseX = 0, mouseY = 0;
    
    // Göz Değişkenleri
    let eyeX = window.innerWidth / 2;
    let eyeY = window.innerHeight / 2;
    let pupilX = eyeX, pupilY = eyeY; // Gerçek ışık kaynağının konumu
    let currentAngle = 0;
    let targetAngle = 0;
    let rotationSpeed = 0.05;
    const fovHalfAngle = 20 * (Math.PI / 180);
    const irisDist = 18; // İrisin göz merkezinden ne kadar kaydığı
    let eyeAIInterval;

    // Duvarlar (Map)
    let walls = [
        {id: 'w0', x: window.innerWidth*0.4, y: window.innerHeight*0.4, w: 60, h: 60}, // Merkeze yakın blok
        {id: 'w1', x: window.innerWidth*0.15, y: window.innerHeight*0.2, w: 200, h: 40},
        {id: 'w2', x: window.innerWidth*0.3, y: window.innerHeight*0.6, w: 40, h: 250},
        {id: 'w3', x: window.innerWidth*0.6, y: window.innerHeight*0.25, w: 300, h: 40},
        {id: 'w4', x: window.innerWidth*0.75, y: window.innerHeight*0.6, w: 40, h: 200},
        {id: 'w5', x: window.innerWidth*0.1, y: window.innerHeight*0.8, w: 150, h: 40}
    ];

    // Sabit Çevresel Işıklar (Sarı/Beyaz)
    let ambientLights = [
        {x: window.innerWidth * 0.2, y: window.innerHeight * 0.1, color: 'rgba(255, 245, 220, 1)', radius: 450},
        {x: window.innerWidth * 0.8, y: window.innerHeight * 0.15, color: 'rgba(255, 255, 240, 1)', radius: 400},
        {x: window.innerWidth * 0.5, y: window.innerHeight * 0.85, color: 'rgba(250, 240, 200, 1)', radius: 500}
    ];

    function applyWallStyles() {
        walls.forEach(w => {
            let el = document.getElementById(w.id);
            if(el) {
                el.style.left = w.x + 'px'; el.style.top = w.y + 'px';
                el.style.width = w.w + 'px'; el.style.height = w.h + 'px';
            }
        });
    }

    // Ses Motoru
    let audioCtx, masterGain, droneOsc, cryOsc;

    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.4;

        droneOsc = audioCtx.createOscillator(); droneOsc.type = 'sine'; droneOsc.frequency.value = 45;
        let dGain = audioCtx.createGain(); dGain.gain.value = 0.7;
        droneOsc.connect(dGain); dGain.connect(masterGain); droneOsc.start();
    }

    // Duvar Kırılma Sesi (Prosedürel Noise)
    function playCrashSound() {
        if(!audioCtx) return;
        let bufferSize = audioCtx.sampleRate * 0.4;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; // Beyaz Gürültü
        
        let noiseSource = audioCtx.createBufferSource(); noiseSource.buffer = buffer;
        let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
        let gain = audioCtx.createGain();
        gain.gain.setValueAtTime(1.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        noiseSource.connect(filter); filter.connect(gain); gain.connect(masterGain);
        noiseSource.start();
    }

    function playCrySound() {
        if(!audioCtx) return;
        cryOsc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        cryOsc.type = 'sawtooth';
        cryOsc.frequency.setValueAtTime(600, audioCtx.currentTime);
        cryOsc.frequency.linearRampToValueAtTime(1800, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.1);
        cryOsc.connect(gain); gain.connect(masterGain); cryOsc.start();
    }

    // --- RAYCASTING MOTORU ---
    let segments = [];
    function buildSegments() {
        segments = [];
        segments.push({p1:{x:0,y:0}, p2:{x:window.innerWidth, y:0}});
        segments.push({p1:{x:window.innerWidth,y:0}, p2:{x:window.innerWidth, y:window.innerHeight}});
        segments.push({p1:{x:window.innerWidth,y:window.innerHeight}, p2:{x:0, y:window.innerHeight}});
        segments.push({p1:{x:0,y:window.innerHeight}, p2:{x:0, y:0}});
        
        walls.forEach(w => {
            let pts = [{x:w.x, y:w.y}, {x:w.x+w.w, y:w.y}, {x:w.x+w.w, y:w.y+w.h}, {x:w.x, y:w.y+w.h}];
            segments.push({p1:pts[0], p2:pts[1]}); segments.push({p1:pts[1], p2:pts[2]});
            segments.push({p1:pts[2], p2:pts[3]}); segments.push({p1:pts[3], p2:pts[0]});
        });
    }

    function getIntersection(ray, segment) {
        let r_dx = Math.cos(ray.angle), r_dy = Math.sin(ray.angle);
        let s_dx = segment.p2.x - segment.p1.x, s_dy = segment.p2.y - segment.p1.y;
        let denom = s_dx*r_dy - s_dy*r_dx;
        if(denom === 0) return null;
        let T2 = (r_dx*(segment.p1.y - ray.y) + r_dy*(ray.x - segment.p1.x)) / denom;
        let T1 = (segment.p1.x + s_dx*T2 - ray.x) / r_dx;
        if(T1 > 0 && T2 >= 0 && T2 <= 1) return { x: ray.x + r_dx*T1, y: ray.y + r_dy*T1, t1: T1 };
        return null;
    }

    function calculateVisibilityPolygon(ox, oy) {
        let points = [];
        segments.forEach(seg => {
            [seg.p1, seg.p2].forEach(pt => {
                let angle = Math.atan2(pt.y - oy, pt.x - ox);
                [-0.0001, 0, 0.0001].forEach(offset => {
                    let ray = {x: ox, y: oy, angle: angle + offset};
                    let closest = null, minT1 = Infinity;
                    segments.forEach(s => {
                        let inter = getIntersection(ray, s);
                        if(inter && inter.t1 < minT1) { minT1 = inter.t1; closest = inter; }
                    });
                    if(closest) points.push({angle: ray.angle, x: closest.x, y: closest.y, t1: minT1});
                });
            });
        });
        return points.sort((a,b) => a.angle - b.angle);
    }

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        applyWallStyles(); buildSegments();
    }
    window.addEventListener('resize', resize); resize();

    document.getElementById('start-btn').addEventListener('click', () => {
        initAudio(); resize();
        setTimeout(() => {
            gameState = 'playing';
            document.getElementById('start-menu').style.opacity = '0';
            targetZone.style.opacity = '1';
            startEyeAI();
            renderLoop();
        }, 100);
    });

    document.addEventListener('mousemove', (e) => {
        if(gameState === 'menu' || gameState === 'gameover') return;
        let oldX = mouseX, oldY = mouseY;
        mouseX = e.clientX; mouseY = e.clientY;

        if(gameState === 'playing' && !eyeContainer.classList.contains('blink')) {
            if(Math.abs(mouseX - oldX) > 1 || Math.abs(mouseY - oldY) > 1) {
                checkDetection();
            }
        }
    });

    function checkDetection() {
        // Göz bebeğinden fareye olan açı
        let angleToMouse = Math.atan2(mouseY - pupilY, mouseX - pupilX);
        let angleDiff = Math.abs(currentAngle - angleToMouse);
        while(angleDiff > Math.PI) angleDiff -= 2*Math.PI;
        angleDiff = Math.abs(angleDiff);

        if(angleDiff <= fovHalfAngle) {
            let ray = {x: pupilX, y: pupilY, angle: angleToMouse};
            let distToMouse = Math.hypot(mouseX-pupilX, mouseY-pupilY);
            let hitWall = false;
            
            for(let s of segments) {
                let inter = getIntersection(ray, s);
                if(inter && inter.t1 < distToMouse) { hitWall = true; break; }
            }
            if(!hitWall) triggerChase();
        }
    }

    function startEyeAI() {
        const aiTick = () => {
            if(gameState !== 'playing') return;
            targetAngle = Math.random() * Math.PI * 2;
            rotationSpeed = Math.random() > 0.5 ? (0.01 + Math.random()*0.02) : (0.1 + Math.random()*0.2);

            if(Math.random() < 0.25) {
                eyeContainer.classList.add('blink');
                setTimeout(() => eyeContainer.classList.remove('blink'), 80);
            }
            eyeAIInterval = setTimeout(aiTick, 600 + Math.random() * 1500);
        };
        aiTick();
    }

    function triggerChase() {
        if(gameState === 'chase') return;
        gameState = 'chase';
        clearTimeout(eyeAIInterval);
        playCrySound();
        eyeContainer.classList.add('enraged'); // CSS class ile parlamayı etkinleştir
    }

    function triggerGameOver() {
        gameState = 'gameover';
        if(cryOsc) { cryOsc.stop(); cryOsc = null; }
        messageScreen.style.opacity = '1';
        setTimeout(() => location.reload(), 3000);
    }

    // --- OYUN DÖNGÜSÜ ---
    function renderLoop() {
        if(gameState === 'gameover') return;

        // İris/Pupil pozisyon hesaplamaları
        if(gameState === 'playing') {
            let diff = targetAngle - currentAngle;
            while(diff < -Math.PI) diff += Math.PI * 2;
            while(diff > Math.PI) diff -= Math.PI * 2;
            currentAngle += diff * rotationSpeed;
        }

        let iX = Math.cos(currentAngle) * irisDist;
        let iY = Math.sin(currentAngle) * irisDist;
        iris.style.transform = `translate(calc(-50% + ${iX}px), calc(-50% + ${iY}px))`;
        
        // Pupil'in ekrandaki mutlak konumu (Görüş buradan çıkacak)
        pupilX = eyeX + iX;
        pupilY = eyeY + iY;

        // 1. ZİFİRİ KARANLIK KATMANI ÇİZ (Maske)
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 1)'; // Saf siyah
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. IŞIK KAYNAKLARIYLA KARANLIĞI DEL (Destination-out)
        ctx.globalCompositeOperation = 'destination-out';
        
        // Sabit Çevresel Işıklar (Sarı/Beyaz)
        ambientLights.forEach(light => {
            let poly = calculateVisibilityPolygon(light.x, light.y);
            ctx.beginPath();
            ctx.moveTo(poly[0].x, poly[0].y);
            for(let i=1; i<poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
            ctx.closePath();
            
            let grad = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, light.radius);
            // Işığın merkezinden kenarına doğru opaklık azalır, bu da siyah maskede delik açar
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)'); 
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad; ctx.fill();
        });

        // Gözün Görüş Konisi ile karanlığı del
        let eyePoly = calculateVisibilityPolygon(pupilX, pupilY);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(pupilX, pupilY);
        ctx.arc(pupilX, pupilY, 3000, currentAngle - fovHalfAngle, currentAngle + fovHalfAngle);
        ctx.clip();
        
        ctx.beginPath();
        ctx.moveTo(eyePoly[0].x, eyePoly[0].y);
        for(let i=1; i<eyePoly.length; i++) ctx.lineTo(eyePoly[i].x, eyePoly[i].y);
        ctx.closePath();
        
        let eyeGrad = ctx.createRadialGradient(pupilX, pupilY, 0, pupilX, pupilY, 1500);
        eyeGrad.addColorStop(0, 'rgba(255, 255, 255, 1)'); // Karanlığı sil
        eyeGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = eyeGrad; ctx.fill();
        ctx.restore();

        // 3. GÖRÜŞ KONİSİNE KIRMIZI TINT UYGULA (Source-over)
        ctx.globalCompositeOperation = 'source-over';
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(pupilX, pupilY);
        ctx.arc(pupilX, pupilY, 3000, currentAngle - fovHalfAngle, currentAngle + fovHalfAngle);
        ctx.clip();
        
        ctx.beginPath();
        ctx.moveTo(eyePoly[0].x, eyePoly[0].y);
        for(let i=1; i<eyePoly.length; i++) ctx.lineTo(eyePoly[i].x, eyePoly[i].y);
        ctx.closePath();
        
        let redTintGrad = ctx.createRadialGradient(pupilX, pupilY, 0, pupilX, pupilY, 1500);
        if(gameState === 'chase') {
            redTintGrad.addColorStop(0, 'rgba(255, 0, 0, 0.6)'); // Yakalandığında kıpkırmızı
            redTintGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');
        } else {
            redTintGrad.addColorStop(0, 'rgba(255, 0, 0, 0.2)'); // Normalde hafif kırmızımsı
            redTintGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');
        }
        ctx.fillStyle = redTintGrad; ctx.fill();
        ctx.restore();

        // --- KOVALAMA VE YIKIM FİZİĞİ ---
        if(gameState === 'chase') {
            let dx = mouseX - eyeX; let dy = mouseY - eyeY;
            let distToMouse = Math.hypot(dx, dy);
            
            if(distToMouse < 40) {
                triggerGameOver(); return;
            }

            // Tam fareye kilitlen (Takip Yönü)
            currentAngle = Math.atan2(dy, dx);
            
            // YALPALAMA (Wobble) Mekaniği: İleri giderken yılan gibi sağa/sola savrul
            let chaseSpeed = 11;
            let time = Date.now() / 40;
            let wobbleAmount = 25; // Ne kadar geniş savrulacağı
            
            // İleri Vektörü
            let forwardX = Math.cos(currentAngle) * chaseSpeed;
            let forwardY = Math.sin(currentAngle) * chaseSpeed;
            
            // Perpendicular (Dik) Vektör ile savrulma
            let wobbleX = Math.cos(currentAngle + Math.PI/2) * Math.sin(time) * wobbleAmount;
            let wobbleY = Math.sin(currentAngle + Math.PI/2) * Math.sin(time) * wobbleAmount;
            
            eyeX += forwardX + wobbleX;
            eyeY += forwardY + wobbleY;
            
            // YIKIM (Çevreye Zarar Verme)
            for(let i = walls.length - 1; i >= 0; i--) {
                let w = walls[i];
                // Göz bir duvarın içine girdi mi? (Basit kutu çarpışması)
                if(eyeX > w.x - 30 && eyeX < w.x + w.w + 30 && eyeY > w.y - 30 && eyeY < w.y + w.h + 30) {
                    let wallEl = document.getElementById(w.id);
                    if(wallEl && !wallEl.classList.contains('destroyed')) {
                        wallEl.classList.add('destroyed'); // CSS ile patlat
                        walls.splice(i, 1); // Diziden çıkar
                        buildSegments(); // Gölgeleri hemen güncelle (Duvar yıkılınca arkası aydınlanır)
                        playCrashSound(); // Ses
                        
                        // Ekran sarsıntısı
                        gameContainer.classList.remove('shake-hard');
                        void gameContainer.offsetWidth; // Reflow tetikle
                        gameContainer.classList.add('shake-hard');
                    }
                }
            }
        }

        eyeContainer.style.left = eyeX + 'px';
        eyeContainer.style.top = eyeY + 'px';

        // Kazanma Durumu
        if(gameState === 'playing') {
            let tRect = targetZone.getBoundingClientRect();
            if(mouseX > tRect.left && mouseX < tRect.right && mouseY > tRect.top && mouseY < tRect.bottom) {
                gameState = 'gameover';
                messageScreen.innerHTML = "KAÇTIN.";
                messageScreen.style.color = "#0f0";
                messageScreen.style.textShadow = "0 0 30px #0f0";
                messageScreen.style.opacity = '1';
                setTimeout(() => location.reload(), 3000);
            }
        }

        requestAnimationFrame(renderLoop);
    }
</script>
</body>
</html>
