<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOTGE - CHAOS HAVOC</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050000; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            height: 100vh; user-select: none; -webkit-user-select: none;
        }

        /* Normal Sarsıntı */
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-3px, 2px) rotate(0deg); }
            80% { transform: translate(-2px, -2px) rotate(1deg); }
            100% { transform: translate(2px, -3px) rotate(-1deg); }
        }
        .shake { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }

        /* SİSTEM ÇÖKÜŞÜ (GLITCH) SARSINTISI VE RENK BOZULMASI */
        @keyframes severeShake {
            0% { transform: translate(5px, 5px) rotate(0deg); filter: hue-rotate(0deg); }
            10% { transform: translate(-10px, -15px) rotate(-2deg); filter: hue-rotate(90deg) invert(20%); }
            20% { transform: translate(-15px, 5px) rotate(3deg); filter: hue-rotate(180deg) invert(0%); }
            30% { transform: translate(15px, 15px) rotate(0deg); filter: hue-rotate(270deg) invert(30%); }
            40% { transform: translate(5px, -10px) rotate(4deg); filter: hue-rotate(360deg) invert(0%); }
            50% { transform: translate(-10px, 15px) rotate(-3deg); filter: hue-rotate(45deg); }
            60% { transform: translate(-15px, 5px) rotate(0deg); filter: contrast(200%); }
            70% { transform: translate(15px, 5px) rotate(-2deg); filter: invert(10%); }
            80% { transform: translate(-5px, -10px) rotate(3deg); filter: hue-rotate(120deg); }
            90% { transform: translate(10px, 15px) rotate(0deg); }
            100% { transform: translate(10px, -15px) rotate(-3deg); }
        }
        .severe-shake { animation: severeShake 0.1s infinite !important; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .menu-anim { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #gameContainer {
            position: relative; width: 1200px; height: 900px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.15);
            border: 1px solid #330011;
            background: radial-gradient(circle at center, #0a0003 0%, #000 100%);
            cursor: none !important; 
        }

        #gameContainer.paused { cursor: default !important; }
        canvas { display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.85); z-index: 10;
        }

        h1 {
            font-size: 80px; margin: 0; letter-spacing: 12px; color: #fff;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.8), 2px 2px 0px #00f7ff, -2px -2px 0px #ff0055;
            font-weight: 900; text-align: center; margin-bottom: 40px;
        }

        .button-group { display: flex; gap: 20px; }

        button {
            padding: 15px 40px; font-size: 18px; background: transparent;
            color: #ff0055; border: 2px solid #ff0055; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
        }
        button:hover { background: #ff0055; color: #fff; box-shadow: 0 0 30px rgba(255, 0, 85, 0.6); transform: scale(1.05); }

        #upgradeCards { display: flex; gap: 20px; margin-top: 30px; }

        .card {
            width: 260px; height: 320px; border: 2px solid #ff0055; background: #0a0003;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 25px; text-align: center; cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        .card:hover::before { left: 150%; }
        .card:hover { border-color: #00f7ff; box-shadow: 0 0 30px rgba(0, 247, 255, 0.4); transform: translateY(-10px); }
        .card h3 { color: #fff; margin-bottom: 15px; font-size: 22px; text-shadow: 0 0 10px #ff0055;}
        .card p { color: #aaa; font-size: 14px; line-height: 1.5; margin: 0;}
        .card .status { margin-top: 15px; font-size: 12px; color: #00f7ff; font-weight: bold; letter-spacing: 1px; }

        .card.evolved { border-color: #ffd700; background: #1a1500; }
        .card.evolved:hover { border-color: #fff; box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        .card.evolved h3 { color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.8); font-size: 24px; }
        .card.evolved p { color: #ddd; }
        .card.evolved .status { color: #ffd700; }

        #uiLeft {
            position: absolute; top: 25px; left: 25px; font-size: 28px; font-weight: bold;
            color: rgba(255, 255, 255, 0.9); pointer-events: none; text-shadow: 0 0 10px #ff0055;
            display: flex; align-items: center; gap: 15px;
        }
        #grazeAlert { color: #fff; font-size: 16px; opacity: 0; text-shadow: 0 0 10px #fff; transition: opacity 0.1s; }
        
        #uiRight {
            position: absolute; top: 25px; right: 25px; text-align: right; pointer-events: none;
        }
        #levelAlertLabel { font-size: 16px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; transition: color 0.2s;}
        #levelAlertValue { font-size: 32px; color: #00f7ff; text-shadow: 0 0 15px rgba(0, 247, 255, 0.6); font-weight: 900; }
    </style>
</head>
<body>

    <div id="gameContainer" class="paused">
        <canvas id="gameCanvas" width="1200" height="900"></canvas>
        
        <div id="uiLeft" style="display:none;">
            <span>SKOR: <span id="score">0</span></span>
            <span id="grazeAlert">GRAZE!</span>
        </div>

        <div id="uiRight" style="display:none;">
            <div id="levelAlertLabel">Sıradaki Eklenti</div>
            <div id="levelAlertValue">1000</div>
        </div>
        
        <div id="upgradeScreen" class="overlay" style="display:none;">
            <div class="menu-anim" style="display: flex; flex-direction: column; align-items: center;">
                <h1 style="font-size: 60px; margin-bottom: 10px;">SİSTEM ANOMALİSİ</h1>
                <p style="color: #00f7ff; font-size: 18px;">BİR PROTOKOL SEÇ VEYA GELİŞTİR</p>
                <div id="upgradeCards"></div>
            </div>
        </div>

        <div id="startMenu" class="overlay">
            <div class="menu-anim" style="display: flex; flex-direction: column; align-items: center;">
                <h1>DOTGE<br>CHAOS HAVOC</h1>
                <div class="button-group">
                    <button onclick="initGame(event)">BAŞLAT</button>
                    <button onclick="window.location.href='dotge.html'" style="color:#aaa; border-color:#aaa;">NORMALE DÖN</button>
                </div>
            </div>
        </div>

        <div id="gameOverScreen" class="overlay" style="display:none;">
            <div class="menu-anim" style="display: flex; flex-direction: column; align-items: center;">
                <h1 style="color: #ff0000; font-size: 90px; text-shadow: 0 0 30px #ff0000;">SİSTEM ÇÖKTÜ</h1>
                <p style="color: #fff; font-size: 24px; margin-bottom: 40px;">FİNAL SKOR: <span id="finalScore" style="color: #00f7ff; font-weight: bold;">0</span></p>
                <div class="button-group">
                    <button onclick="initGame(event)">YENİDEN BAŞLAT</button>
                    <button onclick="window.location.href='dotge.html'" style="color:#aaa; border-color:#aaa;">NORMALE DÖN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startMenu = document.getElementById('startMenu');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const upgradeScreen = document.getElementById('upgradeScreen');
        const upgradeCardsContainer = document.getElementById('upgradeCards');
        const finalScoreElement = document.getElementById('finalScore');
        const uiLeft = document.getElementById('uiLeft');
        const uiRight = document.getElementById('uiRight');
        const grazeAlert = document.getElementById('grazeAlert');
        const levelAlertLabel = document.getElementById('levelAlertLabel');
        const nextUpgradeScoreElement = document.getElementById('levelAlertValue');

        let animationId;
        let score = 0;
        let frames = 0;
        let gameActive = false;
        let isPaused = true;
        let transitioningToDiyar = false; 
        let audioCtx; 

        let spawnInterval = 46; 
        let spawnTimer = 0;
        let swarmReduced = false; 
        
        let globalEnemySpeed = 1.3; 
        let lastSpeedThreshold = 0;
        let speedBoostAmount = 0.20; 
        let nextUpgradeThreshold = 0; 

        const ROMAN_NUMERALS = ["", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];

        const player = {
            x: canvas.width / 2, y: canvas.height / 2,
            visualRadius: 12,     
            hitboxRadius: 7,      
            baseColor: '#ff0055', grazeColor: '#ffffff', currentColor: '#ff0055',
            levels: { orbits: 0, pulse: 0, aura: 0, time: 0, shield: 0, laser: 0, mine: 0, turret: 0, micro: 0, decoy: 0, greed: 0, pierce: 0 },
            
            scoreMulti: 1.0,
            orbitCount: 0, orbitAngle: 0,
            hasPulse: false, pulseCooldown: 300, pulseTimer: 0,
            grazeBonusRadius: 30, auraLevel: 0,
            shieldCount: 0,
            hasLaser: false, laserCooldown: 350, laserTimer: 0,
            hasTurret: false, turretCooldown: 80, turretTimer: 0,
            hasDecoy: false, decoyCooldown: 400, decoyTimer: 0,
            piercingShots: false
        };

        const UPGRADE_POOL = [
            { id: 'orbits', getBaseName: () => 'YAVRULAR', getDesc: () => `Etrafında dönen ve düşmanı parçalayan kinetik bir küre ekler.`, apply: () => { player.levels.orbits++; player.orbitCount++; } },
            { id: 'pulse', getBaseName: () => 'ŞOK DALGASI', getDesc: () => `Düşmanları savuran periyodik bir dalga yayar. (Bekleme süresi kısalır)`, apply: () => { player.levels.pulse++; player.hasPulse = true; player.pulseCooldown = Math.max(80, 300 - (player.levels.pulse * 30)); } },
            { id: 'aura', getBaseName: () => 'RADYOAKTİF AURA', getDesc: () => `Sıyırma menzilini artırır ve yakındaki düşmanları yavaşlatır.`, apply: () => { player.levels.aura++; player.grazeBonusRadius += 10; player.auraLevel++; } },
            { id: 'time', getBaseName: () => 'ZAMAN BÜKÜCÜ', getDesc: () => `Tüm düşmanların taban hızını kalıcı olarak %8 düşürür.`, apply: () => { player.levels.time++; globalEnemySpeed *= 0.92; spawnInterval += 5; } },
            { id: 'shield', getBaseName: () => 'NANO KALKAN', getDesc: () => `Seni ölümcül bir darbeden koruyan kalkan katmanı ekler.`, apply: () => { player.levels.shield++; player.shieldCount++; } },
            { id: 'laser', getBaseName: () => 'LAZER AĞI', getDesc: () => `Ekrana anlık bir ölüm lazeri atar. (Bekleme süresi kısalır)`, apply: () => { player.levels.laser++; player.hasLaser = true; player.laserCooldown = Math.max(100, 350 - (player.levels.laser * 35)); } },
            { id: 'mine', getBaseName: () => 'SERSERİ MAYIN', getDesc: () => `Ekran duvarlarından seken bağımsız bir yıkım küresi fırlatır.`, apply: () => { player.levels.mine++; spawnMine(); } },
            { id: 'turret', getBaseName: () => 'OTO-TARET', getDesc: () => `En yakındaki düşmana otomatik olarak enerji mermisi sıkar.`, apply: () => { player.levels.turret++; player.hasTurret = true; player.turretCooldown = Math.max(15, 80 - (player.levels.turret * 15)); } },
            { id: 'micro', getBaseName: () => 'MİKRO ÇEKİRDEK', getDesc: () => `Gerçek çarpışma alanını ve dış görseli küçülterek kaçmayı kolaylaştırır.`, apply: () => { player.levels.micro++; player.visualRadius = Math.max(8, player.visualRadius - 2); player.hitboxRadius = Math.max(3, player.hitboxRadius - 1); } },
            { id: 'decoy', getBaseName: () => 'HOLOGRAFİK YEM', getDesc: () => `Arada sırada düşmanların dikkatini çeken ve patlayan bir kopya bırakır.`, apply: () => { player.levels.decoy++; player.hasDecoy = true; player.decoyCooldown = Math.max(150, 400 - (player.levels.decoy * 40)); } },
            { id: 'greed', getBaseName: () => 'AÇGÖZLÜLÜK', getDesc: () => `Yok etme ve sıyırma işlemlerinden kazanılan puan çarpanını artırır.`, apply: () => { player.levels.greed++; player.scoreMulti += 0.5; } },
            { id: 'pierce', getBaseName: () => 'ZIRH DELİCİ', getDesc: () => `Oto-Taret mermilerinin düşmanların içinden geçip devam etmesini sağlar.`, apply: () => { player.levels.pierce++; player.piercingShots = true; } }
        ];

        let enemies = []; let particles = []; let orbits = []; let mines = []; let projectiles = []; let decoys = [];

        // P TUŞU İLE TEST KISAYOLU
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p' && gameActive && !transitioningToDiyar) {
                score = 3000;
                scoreElement.innerText = score;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left; player.y = e.clientY - rect.top;
        });

        function triggerShake() {
            if(transitioningToDiyar) return; 
            gameContainer.classList.remove('shake');
            void gameContainer.offsetWidth; 
            gameContainer.classList.add('shake');
        }

        // --- GLITCH VE AĞLAMA/GÜLME SES MOTORU ---
        
        // 1. Arka Plan Standart Glitch (Sesi kısıldı)
        function playGlitchSequence() {
            if (!audioCtx) return;
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    if(audioCtx.state === 'suspended') audioCtx.resume();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = Math.random() > 0.5 ? 'sawtooth' : 'square';
                    osc.frequency.value = 50 + Math.random() * 3000;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    // Sesi eskiden 0.1'di, şimdi 0.015 yapıldı (Kısık)
                    gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (Math.random() * 0.2));
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, Math.random() * 5000); // 5 saniyeye yayıldı
            }
        }

        // 2. Korkunç Manik Ağlama/Gülme Ses Sentezleyicisi (YENİ)
        function playCreepyLaughCrySequence() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const duration = 5.0; // 5 saniye sürecek

            // Farklı ses katmanları oluştur
            for (let i = 0; i < 20; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                // Ağlama için triangle, gülme kopmaları için sawtooth
                osc.type = Math.random() > 0.4 ? 'triangle' : 'sawtooth';
                
                const startTime = now + Math.random() * (duration - 0.5);
                const noteDuration = 0.5 + Math.random() * 1.5;
                
                // Ses başlangıç frekansı (İnsan sesi sınırları)
                const startFreq = 250 + Math.random() * 500; 
                osc.frequency.setValueAtTime(startFreq, startTime);
                
                if (Math.random() > 0.5) {
                    // Ağlama Efekti (Perde aşağı kayar)
                    osc.frequency.exponentialRampToValueAtTime(startFreq / 2.5, startTime + noteDuration);
                } else {
                    // Gülme/Kriz efekti (Frekans ani zıplar)
                    osc.frequency.setValueAtTime(startFreq + 150, startTime + noteDuration * 0.3);
                    osc.frequency.setValueAtTime(startFreq - 100, startTime + noteDuration * 0.6);
                }

                // İnsan sesine benzemesi ve titremesi için LFO (Tremolo/Vibrato)
                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 5 + Math.random() * 10; // 5-15 Hz arası bozuk titreme
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = startFreq * 0.15; // Frekansı ne kadar bükeceği
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                lfo.start(startTime);
                lfo.stop(startTime + noteDuration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                // Volume envelope
                gain.gain.setValueAtTime(0, startTime);
                // Orta seviyede rahatsız edici bir ses seviyesi (0.04)
                gain.gain.linearRampToValueAtTime(0.04 + Math.random()*0.02, startTime + noteDuration * 0.2); 
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);
                
                osc.start(startTime);
                osc.stop(startTime + noteDuration);
            }

            // Derin, boğuk bir bas alt yapısı (Korkuyu artırmak için)
            const oscDeep = audioCtx.createOscillator();
            const gainDeep = audioCtx.createGain();
            oscDeep.type = 'sawtooth';
            oscDeep.frequency.setValueAtTime(50, now);
            oscDeep.frequency.linearRampToValueAtTime(20, now + duration);
            oscDeep.connect(gainDeep);
            gainDeep.connect(audioCtx.destination);
            gainDeep.gain.setValueAtTime(0.05, now);
            gainDeep.gain.linearRampToValueAtTime(0.001, now + duration);
            oscDeep.start(now);
            oscDeep.stop(now + duration);
        }

        function addScore(points) {
            score += Math.floor(points * player.scoreMulti);
        }

        class Projectile {
            constructor(x, y, targetX, targetY, isPiercing) {
                this.x = x; this.y = y; this.radius = 4;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.velocity = { x: Math.cos(angle) * 15, y: Math.sin(angle) * 15 };
                this.isPiercing = isPiercing;
                this.hitEnemies = new Set();
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = '#00f7ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00f7ff';
                ctx.fill(); ctx.shadowBlur = 0;
            }
            update() {
                this.draw(); this.x += this.velocity.x; this.y += this.velocity.y;
            }
        }

        class Enemy {
            constructor(x, y, type) {
                this.type = type; this.age = 0;
                this.grazeCooldown = 0; 
                
                if (type === 'fast') { this.radius = Math.random()*3+5; this.color = '#00ffff'; this.speedMulti = 2.0; this.homing = false; } 
                else if (type === 'tank') { this.radius = Math.random()*10+20; this.color = '#ff0000'; this.speedMulti = 0.6; this.homing = true; } 
                else if (type === 'wavy') { this.radius = Math.random()*4+8; this.color = '#cc00ff'; this.speedMulti = 1.2; this.homing = false; } 
                else { this.radius = Math.random()*6+8; this.color = '#ff9900'; this.speedMulti = 1.0; this.homing = false; }

                this.x = x; this.y = y;
                this.updateVelocityTarget(player.x, player.y);
            }

            updateVelocityTarget(tx, ty) {
                const angle = Math.atan2(ty - this.y, tx - this.x);
                const baseSpeed = (2.0 + (frames / 3000)) * globalEnemySpeed * this.speedMulti; 
                this.baseVx = Math.cos(angle) * baseSpeed;
                this.baseVy = Math.sin(angle) * baseSpeed;
                this.velocity = { x: this.baseVx, y: this.baseVy };
            }

            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0;
            }

            update() {
                this.age++; if(this.grazeCooldown > 0) this.grazeCooldown--;
                
                // Diyar083'e geçiş anında düşmanların kendi kendine parçalanması/titremesi
                if(transitioningToDiyar) {
                    if(Math.random() < 0.4) {
                        particles.push(new Particle(this.x, this.y, Math.random()*3, this.color, { x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8 }));
                    }
                    this.x += (Math.random()-0.5)*12; // Titreme efekti
                    this.y += (Math.random()-0.5)*12;
                }

                this.draw();
                
                let targetX = player.x; let targetY = player.y;
                if(decoys.length > 0) {
                    let nearestDecoy = decoys[0]; let minDist = Infinity;
                    decoys.forEach(d => {
                        let dist = Math.hypot(d.x - this.x, d.y - this.y);
                        if(dist < minDist) { minDist = dist; nearestDecoy = d; }
                    });
                    if(minDist < 400) { targetX = nearestDecoy.x; targetY = nearestDecoy.y; }
                }

                if(this.homing && this.age % 10 === 0) { this.updateVelocityTarget(targetX, targetY); }

                let currentVx = this.velocity.x; let currentVy = this.velocity.y;

                if (this.type === 'wavy') {
                    const perpX = -this.baseVy; const perpY = this.baseVx;
                    const length = Math.hypot(perpX, perpY);
                    if(length !== 0) {
                        const waveFactor = Math.sin(this.age * 0.1) * 4;
                        currentVx += (perpX / length) * waveFactor; currentVy += (perpY / length) * waveFactor;
                    }
                }

                const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                if (player.auraLevel > 0 && distToPlayer < (player.visualRadius + player.grazeBonusRadius) * 1.5) {
                    const slowAmount = 1.0 - Math.min(0.4, (player.auraLevel * 0.05));
                    this.x += currentVx * slowAmount; this.y += currentVy * slowAmount;
                } else {
                    this.x += currentVx; this.y += currentVy;
                }
            }
        }

        class Particle {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius; this.color = color; this.velocity = velocity; this.alpha = 1;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.globalCompositeOperation = 'lighter'; 
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.04; }
        }

        function createExplosion(x, y, color, count=12) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, Math.random()*3+1, color, { x: (Math.random()-0.5)*12, y: (Math.random()-0.5)*12 }));
            }
        }

        function spawnEnemy() {
            let types = ['normal'];
            if (score > 1000) types.push('fast');
            if (score > 2000) types.push('tank');
            if (transitioningToDiyar) return;

            const selectedType = types[Math.floor(Math.random() * types.length)];
            const dummyRadius = 20; 
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - dummyRadius : canvas.width + dummyRadius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - dummyRadius : canvas.height + dummyRadius;
            }
            enemies.push(new Enemy(x, y, selectedType));
        }

        function spawnMine() {
            mines.push({
                x: player.x, y: player.y, radius: 8,
                vx: (Math.random() > 0.5 ? 4 : -4), vy: (Math.random() > 0.5 ? 4 : -4)
            });
        }

        function triggerUpgradeSelection() {
            if(transitioningToDiyar) return;

            enemies.forEach(e => { createExplosion(e.x, e.y, e.color, 10); addScore(2); });
            enemies = []; triggerShake();

            ctx.fillStyle = 'rgba(10, 0, 5, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());

            isPaused = true; 
            gameContainer.classList.add('paused'); 
            
            upgradeCardsContainer.innerHTML = ''; 
            upgradeScreen.style.display = 'flex';
            
            const animContent = upgradeScreen.querySelector('.menu-anim');
            animContent.style.animation = 'none'; animContent.offsetHeight; animContent.style.animation = null;

            let shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            
            choices.forEach(randomUpgrade => {
                const currentLevel = player.levels[randomUpgrade.id];
                const isEvolved = currentLevel > 0;
                
                const card = document.createElement('div');
                card.className = isEvolved ? 'card evolved' : 'card';
                
                const displayName = isEvolved ? `${randomUpgrade.getBaseName()} ${ROMAN_NUMERALS[currentLevel + 1] || '+' + (currentLevel + 1)}` : randomUpgrade.getBaseName();
                
                card.innerHTML = `
                    <h3>${displayName}</h3>
                    <p>${randomUpgrade.getDesc()}</p>
                    <div class="status">${isEvolved ? 'GELİŞTİR (SEVİYE ' + (currentLevel + 1) + ')' : 'YENİ PROTOKOL'}</div>
                `;
                
                card.onclick = () => selectUpgrade(randomUpgrade);
                upgradeCardsContainer.appendChild(card);
            });
        }

        function selectUpgrade(upgrade) {
            upgrade.apply(); 
            upgradeScreen.style.display = 'none';
            isPaused = false; 
            gameContainer.classList.remove('paused'); 
            
            nextUpgradeThreshold += 1000; 
            nextUpgradeScoreElement.innerText = nextUpgradeThreshold;
            
            if(!gameActive) {
                gameActive = true;
                animate(); 
            }
        }

        function animate() {
            if (!gameActive || isPaused) return;
            animationId = requestAnimationFrame(animate);
            
            ctx.fillStyle = 'rgba(10, 0, 5, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- DIYAR083.HTML GEÇİŞ MEKANİĞİ ---
            if (score >= 3000 && !transitioningToDiyar) {
                transitioningToDiyar = true;
                
                // Oyuncuyu ölümsüz yap ve şiddetli titretmeyi başlat
                gameContainer.classList.add('severe-shake');
                
                // Sistem uyarılarını glitch text'e çevir
                levelAlertLabel.innerText = "CRITICAL_ERROR: REALITY_FRACTURE";
                levelAlertLabel.style.color = "#ff0000";
                nextUpgradeScoreElement.innerText = "???";

                // Hem kısık glitch hem de manik ağlama/gülme sesini aynı anda başlat
                playGlitchSequence();
                playCreepyLaughCrySequence();

                // Rastgele Canvas Glitch Blokları Efekti
                let glitchInterval = setInterval(() => {
                    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,0,85,0.2)' : 'rgba(0,247,255,0.2)';
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*600, Math.random()*150);
                }, 60);

                // 5 SANİYE SONRA DİĞER EVRENE (DIYAR083.HTML) GEÇİŞ
                setTimeout(() => {
                    clearInterval(glitchInterval);
                    window.location.href = 'diyar083.html';
                }, 5000); 
            }

            let isGrazingThisFrame = false;

            // --- YETENEKLER ---
            if (player.hasPulse) {
                player.pulseTimer++;
                if (player.pulseTimer >= player.pulseCooldown) {
                    player.pulseTimer = 0; triggerShake();
                    ctx.beginPath(); ctx.arc(player.x, player.y, 180, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 247, 255, 0.5)'; ctx.lineWidth = 4; ctx.stroke();
                    enemies.forEach(enemy => {
                        if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < 180) {
                            enemy.x -= enemy.velocity.x * 12; enemy.y -= enemy.velocity.y * 12;
                        }
                    });
                }
            }

            if (player.hasLaser) {
                player.laserTimer++;
                if(player.laserTimer >= player.laserCooldown) {
                    player.laserTimer = 0; triggerShake();
                    const isHor = Math.random() > 0.5;
                    ctx.beginPath();
                    if(isHor) { ctx.moveTo(0, player.y); ctx.lineTo(canvas.width, player.y); } 
                    else { ctx.moveTo(player.x, 0); ctx.lineTo(player.x, canvas.height); }
                    ctx.strokeStyle = 'rgba(0, 247, 255, 0.9)'; ctx.lineWidth = 6; ctx.shadowBlur = 15; ctx.shadowColor = '#00f7ff';
                    ctx.stroke(); ctx.shadowBlur = 0;

                    for(let i = enemies.length - 1; i >= 0; i--) {
                        let e = enemies[i];
                        if((isHor && Math.abs(e.y - player.y) < e.radius + 8) || (!isHor && Math.abs(e.x - player.x) < e.radius + 8)) {
                            createExplosion(e.x, e.y, e.color); addScore(10); enemies.splice(i, 1);
                        }
                    }
                }
            }

            if (player.hasDecoy) {
                player.decoyTimer++;
                if(player.decoyTimer >= player.decoyCooldown) {
                    player.decoyTimer = 0;
                    decoys.push({ x: player.x, y: player.y, life: 180 }); 
                }
            }
            
            for(let i = decoys.length - 1; i >= 0; i--) {
                let d = decoys[i]; d.life--;
                ctx.beginPath(); ctx.arc(d.x, d.y, 8, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 247, 255, ${d.life/180})`; ctx.fill();
                if(d.life <= 0) {
                    createExplosion(d.x, d.y, '#00f7ff', 20);
                    for(let j = enemies.length -1; j >= 0; j--) {
                        if(Math.hypot(enemies[j].x - d.x, enemies[j].y - d.y) < 80) {
                            createExplosion(enemies[j].x, enemies[j].y, enemies[j].color); addScore(5); enemies.splice(j, 1);
                        }
                    }
                    decoys.splice(i, 1);
                }
            }

            if (player.hasTurret) {
                player.turretTimer++;
                if(player.turretTimer >= player.turretCooldown && enemies.length > 0) {
                    player.turretTimer = 0;
                    let nearest = enemies[0]; let minDist = Infinity;
                    enemies.forEach(e => { let d = Math.hypot(e.x - player.x, e.y - player.y); if(d < minDist) { minDist = d; nearest = e; } });
                    projectiles.push(new Projectile(player.x, player.y, nearest.x, nearest.y, player.piercingShots));
                }
            }

            for(let p = projectiles.length - 1; p >= 0; p--) {
                let proj = projectiles[p]; proj.update();
                let destroyed = false;
                for(let e = enemies.length - 1; e >= 0; e--) {
                    if(!proj.hitEnemies.has(enemies[e]) && Math.hypot(proj.x - enemies[e].x, proj.y - enemies[e].y) < proj.radius + enemies[e].radius) {
                        createExplosion(enemies[e].x, enemies[e].y, enemies[e].color); addScore(8);
                        if(proj.isPiercing) proj.hitEnemies.add(enemies[e]);
                        enemies.splice(e, 1);
                        if(!proj.isPiercing) { destroyed = true; break; }
                    }
                }
                if(destroyed || proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) {
                    projectiles.splice(p, 1);
                }
            }

            mines.forEach(m => {
                m.x += m.vx; m.y += m.vy;
                if(m.x <= 0 || m.x >= canvas.width) m.vx *= -1;
                if(m.y <= 0 || m.y >= canvas.height) m.vy *= -1;
                ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI*2);
                ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 8; ctx.shadowColor = '#ffff00'; ctx.fill(); ctx.shadowBlur = 0;
            });

            orbits = [];
            if (player.orbitCount > 0) {
                player.orbitAngle += 0.05; 
                for (let i = 0; i < player.orbitCount; i++) {
                    const angleOffset = (Math.PI * 2 / player.orbitCount) * i;
                    const ox = player.x + Math.cos(player.orbitAngle + angleOffset) * 60; 
                    const oy = player.y + Math.sin(player.orbitAngle + angleOffset) * 60;
                    orbits.push({x: ox, y: oy, radius: 5});
                    ctx.beginPath(); ctx.arc(ox, oy, 5, 0, Math.PI*2);
                    ctx.fillStyle = '#00f7ff'; ctx.shadowBlur = 8; ctx.shadowColor = '#00f7ff'; ctx.fill(); ctx.shadowBlur = 0;
                }
            }

            particles.forEach((p, i) => { if (p.alpha <= 0) particles.splice(i, 1); else p.update(); });

            // --- DÜŞMAN İŞLEMLERİ ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.update();
                
                const distToPlayerCenter = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                let enemyDestroyed = false;

                // ÖLÜM KONTROLÜ (Diyar geçişi aktifse ölünmez)
                if (!transitioningToDiyar && distToPlayerCenter < enemy.radius + player.hitboxRadius) {
                    if(player.shieldCount > 0) {
                        player.shieldCount--; createExplosion(player.x, player.y, '#00f7ff', 30);
                        triggerShake(); enemies.splice(i, 1); continue;
                    } else {
                        endGame(); return;
                    }
                }
                
                // SIYIRMA (GRAZE)
                const grazeLimit = enemy.radius + player.visualRadius + player.grazeBonusRadius;
                if (!transitioningToDiyar && enemy.grazeCooldown === 0 && distToPlayerCenter < grazeLimit && distToPlayerCenter >= enemy.radius + player.hitboxRadius) {
                    isGrazingThisFrame = true; addScore(5); 
                    enemy.grazeCooldown = 45; 
                    
                    if(Math.random() < 0.5) {
                        particles.push(new Particle(player.x, player.y, 2, player.grazeColor, { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 }));
                    }
                }

                for (let o of orbits) {
                    if (Math.hypot(o.x - enemy.x, o.y - enemy.y) < enemy.radius + o.radius) {
                        createExplosion(enemy.x, enemy.y, enemy.color); triggerShake(); addScore(8); enemyDestroyed = true; break;
                    }
                }
                if (enemyDestroyed) { enemies.splice(i, 1); continue; }

                for (let m of mines) {
                    if (Math.hypot(m.x - enemy.x, m.y - enemy.y) < enemy.radius + m.radius) {
                        createExplosion(enemy.x, enemy.y, enemy.color); triggerShake(); addScore(8); enemyDestroyed = true; break;
                    }
                }
                if (enemyDestroyed) { enemies.splice(i, 1); continue; }

                if (enemy.x < -200 || enemy.x > canvas.width + 200 || enemy.y < -200 || enemy.y > canvas.height + 200) {
                    enemies.splice(i, 1);
                }
            }

            // OYUNCU ÇİZİMİ
            if (isGrazingThisFrame) { player.currentColor = player.grazeColor; grazeAlert.style.opacity = 1; } 
            else { player.currentColor = player.baseColor; grazeAlert.style.opacity = 0; }

            ctx.beginPath(); ctx.arc(player.x, player.y, player.visualRadius, 0, Math.PI * 2);
            ctx.fillStyle = player.currentColor; ctx.globalAlpha = 0.4;
            ctx.shadowBlur = 15; ctx.shadowColor = player.currentColor; ctx.fill(); ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
            
            if(player.shieldCount > 0) {
                ctx.beginPath(); ctx.arc(player.x, player.y, player.visualRadius + 8, 0, Math.PI * 2);
                ctx.strokeStyle = '#00f7ff'; ctx.lineWidth = Math.min(6, 2 + player.shieldCount); ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(player.x, player.y, player.hitboxRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill();

            // %40 AZALMA MEKANİĞİ: 2000 PUAN SONRASI
            if (score >= 2000 && !swarmReduced) {
                swarmReduced = true;
                spawnInterval = spawnInterval * 1.66; 
                
                levelAlertLabel.innerText = "SÜRÜ AZALDI, HIZ ARTTI!";
                levelAlertLabel.style.color = "#ffcc00";
                setTimeout(() => {
                    if(!transitioningToDiyar) {
                        levelAlertLabel.innerText = "Sıradaki Eklenti";
                        levelAlertLabel.style.color = "#888";
                    }
                }, 3500);
            }

            // DOĞMA MANTIĞI
            spawnTimer++;
            if (spawnTimer >= spawnInterval && !transitioningToDiyar) {
                spawnEnemy();
                if(!swarmReduced && Math.random() < Math.min(0.5, frames / 6000)) spawnEnemy(); 
                spawnTimer = 0;
                if (spawnInterval > 12 && !swarmReduced) spawnInterval -= 0.05; 
            }

            if (frames % 10 === 0 && !transitioningToDiyar) { 
                addScore(1); 
            }
            scoreElement.innerText = score;

            // AZALARAK ARTAN %20-%1 HIZLANMA KURALI
            while (score >= lastSpeedThreshold + 500 && !transitioningToDiyar) {
                lastSpeedThreshold += 500;
                globalEnemySpeed *= (1 + speedBoostAmount);
                speedBoostAmount = Math.max(0.01, speedBoostAmount - 0.01); 
                
                if (score !== 2000) { 
                    levelAlertLabel.innerText = "SİSTEM HIZLANDI!";
                    levelAlertLabel.style.color = "#ff0000";
                    setTimeout(() => {
                        if(!transitioningToDiyar) {
                            levelAlertLabel.innerText = "Sıradaki Eklenti";
                            levelAlertLabel.style.color = "#888";
                        }
                    }, 2500);
                }
            }
            
            // Eklenti Tetikleme (Geçiş anında menü gelmez)
            if (score >= nextUpgradeThreshold && !transitioningToDiyar) { triggerUpgradeSelection(); }

            frames++;
        }

        function initGame(e) {
            score = 0; frames = 0; spawnTimer = 0; 
            enemies = []; particles = []; orbits = []; mines = []; projectiles = []; decoys = []; 
            transitioningToDiyar = false;
            
            // Web Audio API başlat (Tarayıcı politikaları gereği kullanıcı etkileşimi ile açılmalı)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            gameContainer.classList.remove('severe-shake'); 

            spawnInterval = 46; 
            swarmReduced = false;
            
            globalEnemySpeed = 1.3; 
            lastSpeedThreshold = 0;
            speedBoostAmount = 0.20;
            nextUpgradeThreshold = 0; 
            
            player.levels = { orbits: 0, pulse: 0, aura: 0, time: 0, shield: 0, laser: 0, mine: 0, turret: 0, micro: 0, decoy: 0, greed: 0, pierce: 0 };
            player.visualRadius = 12; player.hitboxRadius = 7; player.scoreMulti = 1.0;
            player.orbitCount = 0; player.hasPulse = false; player.pulseCooldown = 300;
            player.grazeBonusRadius = 30; player.auraLevel = 0; player.shieldCount = 0;
            player.hasLaser = false; player.laserCooldown = 350;
            player.hasTurret = false; player.turretCooldown = 80;
            player.hasDecoy = false; player.decoyCooldown = 400; player.piercingShots = false;
            
            if (e && e.clientX !== undefined) {
                const rect = canvas.getBoundingClientRect();
                player.x = e.clientX - rect.left; player.y = e.clientY - rect.top;
            } else {
                player.x = canvas.width / 2; player.y = canvas.height / 2;
            }
            
            scoreElement.innerText = score;
            levelAlertLabel.innerText = "Sıradaki Eklenti";
            levelAlertLabel.style.color = "#888";
            nextUpgradeScoreElement.innerText = nextUpgradeThreshold;
            
            startMenu.style.display = 'none'; gameOverScreen.style.display = 'none'; upgradeScreen.style.display = 'none';
            uiLeft.style.display = 'flex'; uiRight.style.display = 'block';

            triggerUpgradeSelection();
        }

        function endGame() {
            if(transitioningToDiyar) return; 
            
            gameActive = false; isPaused = true;
            cancelAnimationFrame(animationId);
            gameContainer.classList.add('paused'); 
            triggerShake();

            uiLeft.style.display = 'none'; uiRight.style.display = 'none'; grazeAlert.style.opacity = 0;
            gameOverScreen.style.display = 'flex';
            
            const animContent = gameOverScreen.querySelector('.menu-anim');
            animContent.style.animation = 'none'; animContent.offsetHeight; animContent.style.animation = null;

            finalScoreElement.innerText = score;
            createExplosion(player.x, player.y, '#ff0055', 80); createExplosion(player.x, player.y, '#ffffff', 40);
            ctx.fillStyle = 'rgba(10, 0, 5, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());
        }
    </script>
</body>
